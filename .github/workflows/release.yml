name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxxf86vm-dev \
            libegl-dev \
            libgles2-mesa-dev \
            libffi-dev

      - name: Build
        env:
          CGO_ENABLED: '1'
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist
          go build -trimpath -ldflags '-s -w' -o dist/wifiui ./cmd/wifiui

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          STAGE="wifiui-${VERSION}-linux-amd64"
          mkdir -p "dist/${STAGE}"
          cp dist/wifiui "dist/${STAGE}/"
          cp script/wifiui-launch "dist/${STAGE}/"
          cp packaging/wifiui.desktop LICENSE README.md "dist/${STAGE}/"
          chmod +x "dist/${STAGE}/wifiui-launch"
          tar -C dist -czf "dist/${STAGE}.tar.gz" "${STAGE}"
          ( cd dist && sha256sum "${STAGE}.tar.gz" > SHA256SUMS )

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          gh release create "${VERSION}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${VERSION}" \
            --generate-notes \
            "dist/wifiui-${VERSION}-linux-amd64.tar.gz" \
            "dist/SHA256SUMS"
